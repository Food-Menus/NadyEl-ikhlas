<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taba Beach - منيو المشروبات</title>
    <link rel="icon" href="./statics/logoooo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .pricing-section { padding: 40px 5%; flex: 1; }
        .page-title {
            background: rgba(71, 71, 71, 0.48);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            border: 2px solid var(--main-gold);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .category-container { max-width: 900px; margin: 0 auto; }

        /* تعديل الكارت ليدعم الصورة الجانبية */
        .category-card {
            background: rgba(255, 255, 255, 0.95);
            margin-bottom: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-right: 6px solid var(--main-gold);
            display: none; /* يظهر عند تحميل البيانات */
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }

        /* تنسيق جانب صورة المشروبات */
        .category-image {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
        }

        .category-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* تنسيق جانب النصوص */
        .category-info {
            flex: 2;
            padding: 25px;
        }

        .category-info h2 {
            color: #023e8a;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--main-gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed #ccc;
            transition: 0.3s;
        }
        
        .price-item:hover { background: #fdfaf0; padding-right: 5px; }

        .item-name { color: #333; font-weight: bold; font-size: 1.1rem; }
        .item-price { color: var(--main-green); font-weight: bold; font-size: 1.1rem; }

        .btn-green1 {
            background: var(--main-green1);
            padding: 10px 25px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            display: inline-block;
        }

        .loader { text-align: center; color: var(--main-gold); font-weight: bold; padding: 20px; }

        /* استجابة الموبايل */
        @media (max-width: 768px) {
            .category-card { flex-direction: column; }
            .category-image { max-width: 100%; height: 200px; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <div class="logo-box"><img src="./statics/logoooo.png" alt="Logo" style="width: 100%;"></div>
            <div class="site-name">Taba Beach</div>
        </div>
        <nav>
            <input type="checkbox" id="check"><label for="check" class="checkbtn">☰</label>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
                <li><a href="pricing.html">الأسعار</a></li>
            </ul>
        </nav>
    </header>

    <div class="pricing-section">
        <div class="page-title">
            <h1>قائمة المشروبات</h1><br>
            <p> أفضل المشروبات الباردة والساخنة</p>
        </div>

        <div class="category-container">
            <div id="section-drinks" class="category-card" style="display: none;">
                <div class="category-image">
                    <img src="./statics/شاي.jpg" alt="مشروبات">
                </div>
                
                <div class="category-info">
                    <h2>☕ ركن المشروبات</h2>
                    <div id="list-drinks" class="price-list"></div>
                </div>
            </div>

            <div id="main-loader" class="loader">جاري تحضير قائمة المشروبات... 🥤</div>
        </div>
    </div>

    <footer>
        <div style="text-align: center;">
            <a href="contact.html" class="btn btn-green1"> تواصل معنا </a><br><br><hr>
            <h5 class="footer-bottom"> &copy; 2026 Techno Science - جميع الحقوق محفوظة</h5>
        </div>
    </footer>

    <script>
        const drinksSheetURL = 'https://docs.google.com/spreadsheets/d/1tRtVNm7AQEm7vZcRXOde10N_ly_9XEat40_i270NkCM/export?format=csv';

        async function loadDrinks() {
            try {
                const response = await fetch(drinksSheetURL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.text();
                const rows = data.split('\n').map(row => row.trim()).filter(row => row.length > 0).slice(1);

                const listContainer = document.getElementById('list-drinks');
                const sectionContainer = document.getElementById('section-drinks');
                
                let html = '';
                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 2) {
                        const type = columns[0].replace(/"/g, '').trim();
                        const price = columns[1].replace(/"/g, '').trim();
                        html += `
                            <div class="price-item">
                                <span class="item-name">${type}</span>
                                <span class="item-price">${price} ج.م</span>
                            </div>`;
                    }
                });

                if (html !== '') {
                    listContainer.innerHTML = html;
                    sectionContainer.style.display = 'flex'; // تفعيل الـ Flex عند العرض
                }
                
                document.getElementById('main-loader').style.display = 'none';

            } catch (error) {
                document.getElementById('main-loader').innerHTML = '❌ عذراً، فشل تحميل قائمة المشروبات.';
                console.error('Error:', error);
            }
        }

        loadDrinks();
    </script>
</body>
</html>
